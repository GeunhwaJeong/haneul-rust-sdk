name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule: [cron: "40 1 * * *"]

permissions:
  contents: read

env:
  RUSTFLAGS: -Dwarnings

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: rust version
        run: |
          rustc --version
          cargo --version

      - uses: taiki-e/install-action@cargo-nextest

      # install haneul
      - name: Install Haneul Binary
        run: |
          # Get latest testnet release that has ubuntu binary available
          echo "Detecting latest Haneul testnet version with ubuntu binary..."
          HANEUL_VERSION=$(curl -s https://api.github.com/repos/GeunhwaJeong/haneul/releases | \
            jq -r '.[] | select(.tag_name | startswith("testnet-")) |
                   select(.assets[].name | contains("ubuntu-x86_64")) |
                   .tag_name' | head -n 1)

          if [ -z "$HANEUL_VERSION" ]; then
            echo "Failed to detect testnet version, falling back to testnet-v1.63.1"
            HANEUL_VERSION="testnet-v1.63.1"
          fi

          echo "Installing Haneul binary ${HANEUL_VERSION}..."

          wget https://github.com/GeunhwaJeong/haneul/releases/download/${HANEUL_VERSION}/haneul-${HANEUL_VERSION}-ubuntu-x86_64.tgz || {
            echo "Failed to download Haneul ${HANEUL_VERSION}"
            exit 1
          }

          echo "Extracting Haneul binary..."
          tar -xzf haneul-*.tgz ./haneul

          # Move haneul binary to PATH
          echo "Installing Haneul binary..."
          sudo mv haneul /usr/local/bin/

          # Cleanup
          rm -f haneul-*.tgz

          # Verify installation
          echo "Verifying Haneul installation..."
          haneul --version

          # Export HANEUL_BINARY for tests
          echo "HANEUL_BINARY=/usr/local/bin/haneul" >> $GITHUB_ENV

      - name: Run tests
        run: make test

      - run: make is-dirty

  check-features:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: rust version
        run: |
          rustc --version
          cargo --version

      - uses: taiki-e/install-action@cargo-hack

      - name: feature compatibility
        run: make check-features

      - run: make is-dirty

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: rust version
        run: |
          rustc --version
          cargo --version

      - name: rustfmt
        run: make check-fmt

      - name: clippy
        run: make clippy

      - run: make -C crates/haneul-rpc proto

      - run: make is-dirty

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: rust version
        run: |
          rustc --version
          cargo --version

      - name: rustdoc
        run: make doc

      - run: make is-dirty

  wasm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: rust version
        run: |
          rustc --version
          cargo --version

      - uses: taiki-e/install-action@wasm-pack

      - name: Install clang
        run: sudo apt-get install -y clang

      - name: Run tests in wasm
        run: RUSTFLAGS='-Dwarnings --cfg getrandom_backend="wasm_js"' make wasm

      - run: make is-dirty

  semver-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: rust version
        run: |
          rustc --version
          cargo --version

      - uses: taiki-e/install-action@cargo-semver-checks

      - run: cargo semver-checks
